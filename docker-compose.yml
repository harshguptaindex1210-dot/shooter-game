services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: nakama
      POSTGRES_DB: nakama
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.22
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NAKAMA_CORE__RUNTIME_PATH=/nakama/data
    entrypoint:
      - "/nakama/nakama"
      - "--database"
      - "postgres://nakama:nakama@postgres:5432/nakama"
      - "--runtime"
      - "--runtime.path"
      - "/nakama/data"
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./nakama:/nakama/data
